name: proxy-line-observer

services:
  config-ui:
    image: ${CONFIG_UI_IMAGE:-ghcr.io/qqqasdwx/proxy-line-observer-config-ui:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/config:/app/config

  influxdb:
    image: influxdb:2.7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    env_file:
      - ./data/config/stack.env
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
    volumes:
      - ./data/runtime/influxdb:/var/lib/influxdb2
      - ./data/runtime/influxdb-config:/etc/influxdb2

  grafana:
    image: grafana/grafana-oss:11.3.0
    restart: unless-stopped
    user: "0"
    depends_on:
      - influxdb
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./data/config/stack.env
    volumes:
      - ./data/runtime/grafana:/var/lib/grafana
      - ./data/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana/dashboards:/var/lib/grafana/dashboards:ro

  telegraf:
    image: ${TELEGRAF_IMAGE:-ghcr.io/qqqasdwx/proxy-line-observer-telegraf:latest}
    restart: unless-stopped
    depends_on:
      - influxdb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./data/config/stack.env
    volumes:
      - ./data/config:/config:ro
