[agent]
  interval = "${TELEGRAF_INTERVAL}"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "2s"
  flush_interval = "10s"
  flush_jitter = "2s"
  precision = "1s"
  hostname = "proxy-line-observer"
  omit_hostname = false

[[inputs.exec]]
  commands = ["/probes/proxy_probe.sh"]
  timeout = "${TELEGRAF_EXEC_TIMEOUT}"
  data_format = "influx"
  interval = "${TELEGRAF_INTERVAL}"

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
